<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Tempo Aire de Te">
    <title>Tempo Aire de Te</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18211f;
        --muted: #5a6762;
        --leaf: #4f7b5f;
        --rose: #c06c63;
        --paper: #f8f5ef;
        --line: rgba(24, 33, 31, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 15% 15%, rgba(192, 108, 99, 0.18), transparent 28%),
          radial-gradient(circle at 85% 12%, rgba(79, 123, 95, 0.18), transparent 26%),
          var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 720px);
        display: grid;
        justify-items: center;
        gap: 28px;
        text-align: center;
      }

      .logo {
        width: min(72vw, 360px);
        height: auto;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4.25rem);
        line-height: 1;
        font-weight: 700;
      }

      p {
        margin: 0;
        max-width: 34rem;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.6;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      a {
        width: 52px;
        height: 52px;
        display: inline-grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.54);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      a:hover {
        transform: translateY(-2px);
        border-color: rgba(24, 33, 31, 0.28);
        background: rgba(255, 255, 255, 0.82);
      }

      a img {
        width: 26px;
        height: 26px;
        object-fit: contain;
      }

      .divider {
        width: min(180px, 40vw);
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--line), transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="logo-tempo.png" alt="Tempo Aire de Te">
      <div class="divider" aria-hidden="true"></div>
      <h1>Tempo Aire de Te</h1>
      <p>Un espacio para encontrarnos con calma, sabores cuidados y pequenos momentos para disfrutar.</p>
      <nav aria-label="Redes sociales">
        <a href="#" aria-label="Instagram">
          <img src="instagram.png" alt="">
        </a>
        <a href="#" aria-label="Facebook">
          <img src="facebook.png" alt="">
        </a>
      </nav>
    </main>
  </body>
</html>
